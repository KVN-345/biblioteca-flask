<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Biblioteca Flask</title>
</head>
<body>
    <h1>Bienvenido a la Biblioteca</h1>
    <p>Si ves este texto, Flask está funcionando correctamente.</p>

    <a href="{{ url_for('add_book') }}">Agregar libro</a>
    <ul>
      {% for book in books %}
        <li>
          {{ book.title }} - {{ book.author }}
          <a href="{{ url_for('edit_book', book_id=book.id) }}">Editar</a>
          <a href="{{ url_for('delete_book', book_id=book.id) }}">Eliminar</a>
        </li>
      {% endfor %}
    </ul>
</body>
</html>
