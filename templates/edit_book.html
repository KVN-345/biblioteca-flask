{% extends "base.html" %}
{% block content %}
<h2>Editar Libro</h2>
<form method="POST">
  <div class="mb-3">
    <label>Título</label>
    <input type="text" name="titulo" value="{{ book.titulo }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Autor</label>
    <input type="text" name="autor" value="{{ book.autor }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Género</label>
    <input type="text" name="genero" value="{{ book.genero }}" class="form-control" required>
  </div>
  <div class="mb-3">
    <label>Estado</label>
    <input type="text" name="estado" value="{{ book.estado }}" class="form-control" required>
  </div>
  <button type="submit" class="btn btn-primary">Actualizar</button>
</form>
{% endblock %}
